<!DOCTYPE html>

<html>

<head>

<title>Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:#FAF6EE;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.card{

width:420px;

background:white;

padding:40px;

border-radius:24px;

}

input{

width:100%;

padding:14px;

margin-top:15px;

border-radius:10px;

border:1px solid #ddd;

}

.btn{

display:block;

margin-top:20px;

padding:16px;

background:#B63A3A;

color:white;

text-align:center;

text-decoration:none;

border-radius:12px;

}

.skip{

display:block;

margin-top:15px;

text-align:center;

}

</style>

</head>

<body>

<div class="card">

<h1>

Welcome

</h1>

<p>

Login with OTP

</p>

<input
id="phone"
placeholder="Mobile Number"
type="tel">

<button
class="btn"
id="loginBtn">

Login

</button>

<p
id="error"
style="
color:#B63A3A;
margin-top:15px;
display:none;
">

</p>
<br>

<a href="/register.html">

Create Account

</a>
<a
class="skip"
href="/">

Continue as Guest

</a>

</div>

<script src="js/database.js"></script>
<script src="js/auth.js"></script>

<script>

document

.getElementById("loginBtn")

.onclick=function(){


const phone =

document

.getElementById("phone")

.value

.trim();


const error =

document

.getElementById("error");


if(!phone){

    error.innerText =

    "Please enter your mobile number.";

    error.style.display =

    "block";

    return;

}


const users =

getUsers();


const user =

users.find(

u => u.phone === phone

);


if(!user){

    error.innerText =

    "Account not found. Please create an account first.";

    error.style.display =

    "block";

    return;

}


login(user);


/*

RETURN TO MARKETPLACE

*/

window.location.href =

"index.html";


};

</script>
</body>

</html>
