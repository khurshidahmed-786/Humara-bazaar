<!DOCTYPE html>

<html>

<head>

<title>Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:#FAF6EE;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.card{

width:420px;

background:white;

padding:40px;

border-radius:24px;

}

input{

width:100%;

padding:14px;

margin-top:15px;

border-radius:10px;

border:1px solid #ddd;

}

.btn{

display:block;

margin-top:20px;

padding:16px;

background:#B63A3A;

color:white;

text-align:center;

text-decoration:none;

border-radius:12px;

}

.skip{

display:block;

margin-top:15px;

text-align:center;

}

</style>

</head>

<body>

<div class="card">

<h1>

Welcome

</h1>

<p>

Login with OTP

</p>

<input
placeholder="Mobile Number">

<a
class="btn"
href="/role.html">

Send OTP

</a>

<a
class="skip"
href="/">

Continue as Guest

</a>

</div>

</body>

</html>
