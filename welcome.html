<!DOCTYPE html>

<html>

<head>

<title>Hmara Bazaar</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:#FAF6EE;

padding:30px;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

}

.menu{

font-size:34px;

cursor:pointer;

}

.panel{

display:none;

margin-top:20px;

background:white;

padding:20px;

border-radius:16px;

}

.panel a{

display:block;

padding:12px;

text-decoration:none;

color:black;

}

.hero{

margin-top:120px;

text-align:center;

}

input{

width:100%;

padding:16px;

margin-top:20px;

border-radius:12px;

border:1px solid #ddd;

}

button{

margin-top:20px;

padding:16px 22px;

background:#667744;

color:white;

border:none;

border-radius:12px;

width:100%;

}

</style>

</head>

<body>

<div class="header">

<h1>

Hmara Bazaar

</h1>

<div
class="menu"
onclick="toggleMenu()">

☰

</div>

</div>

<div
class="panel"
id="menu">

<a href="/login.html">

Login

</a>

<a href="/register.html">

Register

</a>

<a href="/createshop.html">

Open Shop

</a>

<a href="/services.html">

Services

</a>

</div>

<div class="hero">

<h2>

Local Market. In Your Palm.

</h2>

<br>

<p>

Enter your pincode to continue

</p>

<input
id="pin"
placeholder="Enter Pincode">

<button
onclick="enterMarket()">

Enter Market

</button>

</div>

<script>

function toggleMenu(){

let m=
document.getElementById(
"menu"
);

m.style.display=
m.style.display==="block"
?

"none"

:

"block";

}

function enterMarket(){

let p=
document.getElementById(
"pin"
).value;

localStorage.setItem(
"pincode",
p
);

window.location.href=
"/index.html";

}

</script>

</body>

</html>
