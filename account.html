<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Account | Hmara Bazaar</title>

<script src="js/database.js"></script>
<script src="js/auth.js"></script>

</head>

<body>

<div class="container">

    <img src="assets/logo icon.png" class="logo">

    <h1>Hamara Bazaar</h1>

    <p class="tagline">Delivering Happiness</p>

    <div class="card">

        <h2>Create Account</h2>

        <p>Join your local marketplace.</p>

        <input
        id="name"
        type="text"
        placeholder="Your Name">

        <input
        id="phone"
        type="text"
        placeholder="Phone Number">

        <button onclick="continueAccount()">

            Continue →

        </button>

    </div>

</div>

</body>

</html>
