<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Account | Hmara Bazaar</title>

<script src="js/database.js"></script>
<script src="js/auth.js"></script>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#FAF6EE;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

padding:20px;

}

.container{

width:100%;

max-width:420px;

text-align:center;

}

.logo{

width:90px;

margin-bottom:20px;

}

h1{

color:#B63A3A;

font-size:34px;

}

.tagline{

color:#667744;

margin-top:6px;

margin-bottom:35px;

font-size:18px;

}

.card{

background:white;

padding:32px;

border-radius:24px;

box-shadow:0 10px 30px rgba(0,0,0,.08);

}

.card h2{

color:#333;

margin-bottom:10px;

}

.card p{

color:#666;

margin-bottom:28px;

}

input{

width:100%;

padding:16px;

margin-bottom:16px;

border:1px solid #ddd;

border-radius:14px;

font-size:16px;

outline:none;

}

input:focus{

border-color:#B63A3A;

}

button{

width:100%;

padding:16px;

background:#B63A3A;

color:white;

border:none;

border-radius:14px;

font-size:18px;

cursor:pointer;

transition:.25s;

}

button:hover{

background:#9E2E2E;

}

</style>
</head>

<body>

<div class="container">

    <img src="assets/logo icon.png" class="logo">

    <h1>Hamara Bazaar</h1>

    <p class="tagline">Delivering Happiness</p>

    <div class="card">

        <h2>Create Account</h2>

        <p>Join your local marketplace.</p>

        <input
        id="name"
        type="text"
        placeholder="Your Name">

        <input
        id="phone"
        type="text"
        placeholder="Phone Number">

        <button onclick="continueAccount()">

            Continue →

        </button>

    </div>

</div>

</body>

</html>
