<!DOCTYPE html>

<html>

<head>

<title>Search</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#FAF6EE;
}

.wrap{
max-width:1200px;
margin:auto;
padding:40px;
}

.search{

width:100%;

padding:18px;

border:none;

border-radius:18px;

font-size:18px;

}

.row{

display:flex;

gap:12px;

overflow-x:auto;

margin-top:25px;

}

.chip{

padding:12px 18px;

background:white;

border-radius:30px;

white-space:nowrap;

}

.grid{

display:grid;

grid-template-columns:
1fr 1fr;

gap:20px;

margin-top:40px;

}

.card{

background:white;

padding:25px;

border-radius:18px;

}

.btn{

display:inline-block;

margin-top:15px;

padding:12px 16px;

background:#667744;

color:white;

text-decoration:none;

border-radius:10px;

}
  .bottomnav{

position:fixed;

bottom:0;

left:0;

width:100%;

background:white;

display:flex;

justify-content:space-around;

padding:14px;

box-shadow:

0 -4px 20px rgba(0,0,0,.08);

}

.bottomnav a{

text-decoration:none;

color:#444;

font-size:14px;

text-align:center;

}

body{

padding-bottom:90px;

}

</style>

</head>

<body>

<div class="wrap">

<h1>

Explore

</h1>

<br>

class="search"
placeholder="Search shops, products, services">

<div class="chip">👟 Shoes</div>

</div>

<div class="grid">

<div class="card">

<h2>

Ahmad Grocery

</h2>

<p>

Daily essentials

</p>

<a
class="btn"
href="/grocery.html">

Open

</a>

</div>

<div class="card">

<h2>

Classic Cosmetics

</h2>

<p>

Beauty products

</p>

<a
class="btn"
href="/cosmetics.html">

Open

</a>
  <div class="bottomnav">

<a href="/">🏠<br>Home</a>

<a href="/search.html">

🔍<br>Explore

</a>

<a href="/services.html">

🧰<br>Services

</a>

<a href="/orders.html">

📦<br>Orders

</a>

<a href="/profile.html">

👤<br>Profile

</a>

</div>

</div>

</div>

</div>
<script src="/app.js"></script>

</html>
