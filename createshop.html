<html>

<head>

<body>

<p>

"

">

<script>

function saveShop(){

localStorage.setItem(
"shopName",
document.getElementById("shopname").value
);

</a>
<script>

function publishShop(){

localStorage.setItem(

"shopName",

document
.getElementById(
"shopName"
)
.value

);

localStorage.setItem(

"shopDescription",

document
.getElementById(
"shopDescription"
)
.value

);

localStorage.setItem(

"shopOpen",

document
.getElementById(
"shopOpen"
)
.value

);

document
.getElementById(
"shopClose"
)
.value

);

window.location.href=

"/shop.html";
