<!DOCTYPE html>

<html>

<head>

<title>Create Shop</title>

</head>

<body>
<div style="padding:40px;max-width:700px;margin:auto;">

<h1>

Create Your Shop

</h1>

<br>

<input
id="shopName"
placeholder="Shop Name"
style="width:100%;padding:16px;margin-bottom:14px;">

<input
id="shopLogo"
placeholder="Logo URL (optional)"
style="width:100%;padding:16px;margin-bottom:14px;">

<input
id="shopBanner"
placeholder="Banner URL (optional)"
style="width:100%;padding:16px;margin-bottom:14px;">

<input
id="shopOpen"
placeholder="Opening Time (8:00 AM)"
style="width:100%;padding:16px;margin-bottom:14px;">

<input
id="shopClose"
placeholder="Closing Time (8:00 PM)"
style="width:100%;padding:16px;margin-bottom:14px;">

<textarea
id="shopDescription"
placeholder="Describe your shop"
style="
width:100%;
height:140px;
padding:16px;
margin-bottom:20px;
">
</textarea>

<button
onclick="publishShop()"
style="
width:100%;
padding:18px;
background:#667744;
color:white;
border:none;
border-radius:14px;
">

Publish Shop

</button>

</div>

<script>

function publishShop(){

localStorage.setItem(
"shopName",
document.getElementById("shopName").value
);

localStorage.setItem(
"shopLogo",
document.getElementById("shopLogo").value
);

localStorage.setItem(
"shopBanner",
document.getElementById("shopBanner").value
);

localStorage.setItem(
"shopOpen",
document.getElementById("shopOpen").value
);

localStorage.setItem(
"shopClose",
document.getElementById("shopClose").value
);

localStorage.setItem(
"shopDescription",
document.getElementById("shopDescription").value
);

window.location.href=
"/shop.html";

}

</script>

</body>

</html>
