<!DOCTYPE html>

<html>

<head>

<title>Create Shop</title>

</head>

<body>

<h1>

Create Your Shop

</h1>

<p>

Upload banner

</p>

<p>

Choose theme

</p>

<p>

Add description

</p>
  <input id="shopname" placeholder="Shop Name">

  <input placeholder="Shop Logo URL">

<input placeholder="Banner URL">

<input placeholder="Opening Time">

<input placeholder="Closing Time">

<input placeholder="WhatsApp Number">

<textarea
placeholder="Shop Description">
</textarea>

<a
style="
display:inline-block;
padding:14px 18px;
background:#667744;
color:white;
text-decoration:none;
border-radius:10px;
"
href="/dashboard.html">

<button
onclick="saveShop()"
style="
display:block;
padding:16px;
background:#667744;
color:white;
border:none;
border-radius:12px;
width:100%;
">

Publish Shop

</button>

<script>

function saveShop(){

localStorage.setItem(
"shopName",
document.getElementById("shopname").value
);

window.location.href="/dashboard.html";

}

</script>


</a>

</body>

</html>
