<!DOCTYPE html>
<html>

<head>

<title>Hmara Bazaar</title>

<style>

body{
margin:0;
font-family:Arial;
background:#FAF6EE;
}

header{
background:#B63A3A;
padding:20px;
color:white;
display:flex;
justify-content:space-between;
}

.logo{
font-size:28px;
font-weight:bold;
}

.hero{
padding:80px 20px;
text-align:center;
}

.hero h1{
font-size:52px;
margin-bottom:10px;
color:#B63A3A;
}

.hero p{
color:#667744;
}

.search{
width:70%;
padding:18px;
border-radius:15px;
border:none;
}

.categories{
padding:50px;
}

.card{
display:inline-block;
padding:18px;
margin:10px;
background:white;
border-radius:18px;
}

.shop{
background:white;
margin:50px;
padding:30px;
border-radius:20px;
}

.btn{
background:#667744;
color:white;
padding:12px 20px;
text-decoration:none;
border-radius:10px;
}

</style>

</head>

<body>

<header>

<div class="logo">

Hmara Bazaar

</div>

<div>

Login

</div>

</header>

<div class="hero">

<h1>

Delivering Happiness

</h1>

<p>

Search products, services and shops

</p>

<input
class="search"
placeholder="Search">

</div>

<div class="categories">

<h2>Categories</h2>

<div class="card">Restaurant</div>

<div class="card">Grocery</div>

<div class="card">Shoes</div>

<div class="card">Clothes</div>

<div class="card">Cosmetics</div>

</div>

<div class="shop">

<h2>

Featured Shop

</h2>

<h3>

Ahmad Grocery

</h3>

<p>

Fresh products near you

</p>

<a
class="btn"
href="/shop.html">

Visit Shop

</a>

</div>

</body>

</html>
