<!DOCTYPE html>

<title>Hmara Bazaar</title>

<style>
*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:Arial;

}

body{

background:#FAF6EE;

padding-bottom:110px;

}

.app{

max-width:540px;

margin:auto;

}

.topbar{
position:sticky;
top:0;
z-index:100;
display:grid;

grid-template-columns:

60px

1fr

60px;

align-items:center;

padding:18px 24px;
background:rgba(250,246,238,.92);
backdrop-filter:blur(12px)
border-bottom: 1px solid rgba)0,0,0,.05);
}


.menu{

width:50px;

height:50px;

display:flex;

align-items:center;

justify-content:center;

cursor:pointer;

user-select:none;

}

.notify{

position:relative;

width:50px;

font-size:24px;

text-align:right;

}

.cartBadge{

position:absolute;

top:-6px;

right:-4px;

height:18px;

background:#B63A3A;

color:white;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

font-weight:bold;

}


.center{

display:flex;

justify-content:center;

align-items:center;

gap:12px;

}

.logo{

width:42px;

height:42px;

object-fit:contain;

margin:0;

flex-shrink:0;

}



.title{

font-size:18px;

font-weight:800;

color:#B63A3A;

line-height:1.1;

}


.pin{

font-size:12px;

color:#888;

margin-top:4px;

}



.search{

padding:10px 24px;

}

.searchBox{

background:white;

padding:16px 20px;

border-radius:24px;

display:flex;

align-items:center;

gap:14px;

box-shadow:
0 12px 30px
rgba(0,0,0,.06);

border:1px solid
rgba(0,0,0,.03);

transition:.25s;

}

.searchBox:focus-within{

box-shadow:
0 18px 40px
rgba(102,119,68,.18);

}
.searchBox input{

flex:1;

border:none;

outline:none;

font-size:18px;

}

.categories{

display:flex;

gap:18px;

overflow:auto;

padding:24px;

scroll-behavior:smooth;

}

.categories::-webkit-scrollbar{

display:none;

}


.cat{

min-width:110px;

height:120px;

background:white;

border-radius:30px;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

gap:10px;

box-shadow:

0 10px 30px
rgba(
0,
0,
0,
0.05

);

transition:.2s;

}


.cat span{

font-size:14px;

font-weight:700;

color:#444;

}
.cat:hover{

transform:

translateY(
-4px
);

}

.cat:nth-child(1){

background:#FFF8F2;

}

.cat:nth-child(2){

background:#F8FFF3;

}

.cat:nth-child(3){

background:#FFFDF0;

}

.cat:nth-child(4){

background:#FFF4F8;

}

.cat:nth-child(5){

background:#F4F8FF;

}

.cat:nth-child(6){

background:#FAF6EE;

}

.cta{

margin:24px;

background:

linear-gradient(
135deg,
#F7ECE8,
#FFF
);

padding:36px;

border-radius:28px;

font-size:28px;

font-weight:800;

color:#B63A3A;

}

.section h2{

font-size:24px;

color:#222;

}

.bottom{

position:fixed;

bottom:18px;

left:50%;

transform:

translateX(-50%);

width:

min(
520px,
92%
);

background:white;

border-radius:28px;

display:flex;

justify-content:space-around;

padding:16px 10px;

box-shadow:

0 20px 40px
rgba(
0,
0,
0,
0.08

);

}

.bottom a{

text-decoration:none;

color:#777;

display:flex;

flex-direction:column;

align-items:center;

gap:6px;

font-size:13px;

}

.bottom a div{

font-size:22px;

}

.bottom a:first-child{

color:#B63A3A;

font-weight:700;

}

.tagline{

font-size:12px;

color:#667744;

margin-top:2px;

font-style:italic;
font-weight:600;
}

.brandBlock{

display:flex;

flex-direction:column;

align-items:flex-start;

gap:2px;

}
.shops{

display:flex;

gap:18px;

overflow:auto;

}

.shops::-webkit-scrollbar{

display:none;

}

.shop{

min-width:300px;

background:white;

border-radius:30px;

overflow:hidden;

box-shadow:

0 12px 28px
rgba(
0,
0,
0,
0.05
);

}

.board{

height:140px;

background:

linear-gradient(
135deg,
#667744,
#80975C
);

display:flex;

justify-content:center;

align-items:center;

color:white;

font-size:26px;

font-weight:800;

}


.shopBody{

padding:22px;

}


.status{

font-size:18px;

font-weight:800;

color:#355D2A;

}


.type{

margin-top:10px;

color:#777;

font-size:15px;

}


.shop button{

margin-top:20px;

width:100%;

padding:16px;

border:none;

border-radius:18px;

background:#B63A3A;

color:white;

font-size:16px;

font-weight:700;

}

.services{

display:grid;

grid-template-columns:

1fr 1fr;

gap:16px;

}

.service{

background:white;

padding:26px;

border-radius:22px;

text-align:center;

box-shadow:

0 10px 24px
rgba(
0,
0,
0,
0.04
);

}

.serviceIcon{

font-size:48px;

margin-bottom:16px;

}
.product,
.shop,
.service,
.cat{

cursor:pointer;

transition:

.18s;

}

.product:hover,
.shop:hover,
.service:hover,
.cat:hover{

transform:

translateY(
-6px
);

}

.product:active,
.shop:active,
.service:active,
.cat:active{

transform:

scale(
0.98
);

}

button{

cursor:pointer;

}
.panel{

position:absolute;

top:72px;

left:18px;

width:250px;

background:white;

border-radius:24px;

padding:12px;

box-shadow:
0 16px 40px
rgba(0,0,0,.10);

opacity:0;

visibility:hidden;

transform:
translateY(-10px);

transition:
all .25s ease;

z-index:999;

}
.panel.show{

opacity:1;

visibility:visible;

transform:
translateY(0);

}
.panel a{

display:block;

padding:18px;

text-decoration:none;

color:#222;

border-radius:14px;

}

.panel a:hover{

background:#F8F4EE;

}
.menu{

background:none;

border:none;

}
.products{

display:flex;

gap:18px;

overflow:auto;

padding:0 24px;

}

.products::-webkit-scrollbar{

display:none;

}

.product{

min-width:180px;

background:white;

padding:20px;

border-radius:26px;

box-shadow:
0 10px 24px
rgba(0,0,0,.05);

}

.pImg{

height:120px;

font-size:52px;

display:flex;

align-items:center;

justify-content:center;

}

.pName{

font-weight:700;

.pShop{

}

.pPrice{

font-size:20px;

font-weight:800;

}
.section{

padding:

18px 24px;

}

.sectionHead{

display:flex;

justify-content:

space-between;

align-items:center;

margin-bottom:18px;

}

.sectionHead a{

color:#B63A3A;

font-weight:700;

}

<script>

function toggleMenu(){

const panel = document.getElementById("panel");

panel.classList.toggle("show");

}

document.addEventListener("click",function(e){

const panel = document.getElementById("panel");

const menu = document.getElementById("menuBtn");

if(

!panel.contains(e.target)

&&

!menu.contains(e.target)

){

panel.classList.remove("show");

}

});
document.getElementById("pinDisplay").innerHTML =
"📍 " + (localStorage.getItem("pincode") || "Unknown Area");
let demoProducts=[

{

name:"Product",

shop:"Shop Name",

price:"₹---",

emoji:"🛍"

},

{

name:"Product",

shop:"Shop Name",

price:"₹---",

emoji:"🛍"

}

];

let wrap=

document.getElementById(
"products"
);

demoProducts.forEach(

p=>{

wrap.innerHTML+=`

<div class="product">

<div class="pImg">

${p.emoji}

</div>

<div class="pName">

${p.name}

</div>

<div class="pShop">

${p.shop}

</div>

<div class="pPrice">

${p.price}

</div>

</div>

`;

}

);
function renderShops(){

    let shops = getShops();

    let wrap = document.getElementById("shops");

    wrap.innerHTML = "";

    if(shops.length === 0){

        wrap.innerHTML = `

        <div class="shop">

            <div class="board">
                No Shops Yet
            </div>

            <div class="shopBody">
                Create your first shop
            </div>

        </div>

        `;

        return;

    }

    shops.forEach(s=>{

        wrap.innerHTML += `

        <div class="shop">

            <div class="board">

                ${s.name || "Unnamed Shop"}

            </div>

            <div class="shopBody">

                <div class="status">

                    🟢 Open (${s.open || "8 AM"} - ${s.close || "8 PM"})

                </div>

                <div class="type">

                    ${s.description || "Local Shop"}

                </div>

                <button>

                    Visit

                </button>

            </div>

        </div>

        `;

    });

}
renderShops();
let demoServices=[

{

},

document.getElementById(
"services");

s=>{

serviceWrap.innerHTML+=`

${s.icon}

</div>

<div>

${s.name}

</div>

</div>

`;

}

);
