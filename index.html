<script>

function toggleMenu(){

const panel = document.getElementById("panel");

panel.classList.toggle("show");

}

document.addEventListener("click",function(e){

const panel = document.getElementById("panel");

const menu = document.getElementById("menuBtn");

if(

!panel.contains(e.target)

&&

!menu.contains(e.target)

){

panel.classList.remove("show");

}

});
document.getElementById("pinDisplay").innerHTML =
"📍 " + (localStorage.getItem("pincode") || "Unknown Area");
let demoProducts=[

{

name:"Product",

shop:"Shop Name",

price:"₹---",

emoji:"🛍"

},

{

name:"Product",

shop:"Shop Name",

price:"₹---",

emoji:"🛍"

}

];

let wrap=

document.getElementById(
"products"
);

demoProducts.forEach(

p=>{

wrap.innerHTML+=`

<div class="product">

<div class="pImg">

${p.emoji}

</div>

<div class="pName">

${p.name}

</div>

<div class="pShop">

${p.shop}

</div>

<div class="pPrice">

${p.price}

</div>

</div>

`;

}

);
function renderShops(){

    let shops = getShops();

    let wrap = document.getElementById("shops");

    wrap.innerHTML = "";

    if(shops.length === 0){

        wrap.innerHTML = `

        <div class="shop">

            <div class="board">
                No Shops Yet
            </div>

            <div class="shopBody">
                Create your first shop
            </div>

        </div>

        `;

        return;

    }

    shops.forEach(s=>{

        wrap.innerHTML += `

        <div class="shop">

            <div class="board">

                ${s.name || "Unnamed Shop"}

            </div>

            <div class="shopBody">

                <div class="status">

                    🟢 Open (${s.open || "8 AM"} - ${s.close || "8 PM"})

                </div>

                <div class="type">

                    ${s.description || "Local Shop"}

                </div>

                <button onclick="openShop(${s.id})">

                    Visit Shop

                </button>

            </div>

        </div>

        `;

    });

}
renderShops();
function openShop(id){

    localStorage.setItem("selectedShop", id);

    window.location.href = "./shop.html";

}
let demoServices=[

document.getElementById(

</div>

${s.name}
