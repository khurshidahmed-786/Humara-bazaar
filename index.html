<!DOCTYPE html>
<html>

<head>

<title>Hmara Bazaar</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#FAF6EE;
}
  <div style="padding:20px">

<a href="/shop.html">Shop</a>

|

<a href="/product.html">Product</a>

|

<a href="/cart.html">Cart</a>

|

<a href="/checkout.html">Checkout</a>

|

<a href="/seller.html">Seller</a>

|

<a href="/dashboard.html">Dashboard</a>

</div>

header{
display:flex;
justify-content:space-between;
padding:20px 10%;
background:white;
box-shadow:0 2px 15px rgba(0,0,0,.06);
}

.logo{
font-size:30px;
font-weight:bold;
color:#B63A3A;
}

.menu{
display:flex;
gap:20px;
align-items:center;
}

.hero{

padding:90px 10%;
text-align:center;

}

.hero h1{

font-size:64px;
color:#B63A3A;

}

.hero p{

margin-top:15px;

color:#667744;

font-size:20px;

}

.search{

margin-top:30px;

width:70%;

padding:18px;

border:none;

border-radius:20px;

font-size:18px;

}

.categories{

padding:70px 10%;

}

.cards{

display:flex;

gap:20px;

flex-wrap:wrap;

margin-top:30px;

}

.card{

background:white;

padding:25px;

border-radius:20px;

min-width:170px;

box-shadow:0 4px 20px rgba(0,0,0,.06);

}

.shop{

margin:60px 10%;

padding:40px;

border-radius:25px;

background:#B63A3A;

color:white;

}

.btn{

display:inline-block;

margin-top:20px;

padding:14px 20px;

background:white;

color:#B63A3A;

text-decoration:none;

border-radius:12px;

}

footer{

padding:40px;

text-align:center;

color:#666;

}

</style>

</head>

<body>

<header>

<div class="logo">

Hmara Bazaar

</div>

<div class="menu">

Login

Cart

</div>

</header>

<div class="hero">

<h1>

Delivering Happiness

</h1>

<p>

Visit digital shops and order locally

</p>

<input
class="search"
placeholder="Search products, shops or services">

</div>

<div class="categories">

<h2>

Categories

</h2>

<div class="cards">

<div class="card">🍴 Restaurant</div>

<div class="card">🛒 Grocery</div>

<div class="card">👟 Shoes</div>

<div class="card">👕 Clothes</div>

<div class="card">💄 Cosmetics</div>

</div>

</div>

<div class="shop">

<h2>

Featured Shop

</h2>

<h3>

Ahmad Grocery

</h3>

<p>

Fresh products • Open Now

</p>

<a
href="/shop.html"
class="btn">

Visit Shop

</a>

</div>

<footer>

Hmara Bazaar — Delivering Happiness

</footer>

</body>

</html>
