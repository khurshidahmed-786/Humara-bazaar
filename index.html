<!DOCTYPE html>

<html>

<head>

<title>Hmara Bazaar</title>

<style>
*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:Arial;

}

body{

background:#FAF6EE;

padding-bottom:110px;

}

.app{

max-width:540px;

margin:auto;

}

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

padding:20px 24px;

}

.menu,
.notify{

width:52px;

height:52px;

display:flex;

align-items:center;

justify-content:center;

font-size:28px;

}

.center{

display:flex;

flex-direction:column;

align-items:center;

}

.logo{

width:72px;

height:72px;

object-fit:contain;

margin-bottom:4px;

}

.title{

font-size:28px;

font-weight:800;

color:#B63A3A;

}

.pin{

margin-top:4px;

font-size:15px;

color:#B63A3A;

}

.search{

padding:10px 24px;

}

.searchBox{

background:white;

padding:22px;

border-radius:28px;

display:flex;

align-items:center;

gap:16px;

box-shadow:

0 10px 40px
rgba(
0,
0,
0,
0.05
);

}

.searchBox input{

flex:1;

border:none;

outline:none;

font-size:18px;

}

.categories{

display:flex;

gap:14px;

overflow:auto;

padding:22px;

}

.categories::-webkit-scrollbar{

display:none;

}

.cat{

min-width:120px;

height:120px;

background:white;

border-radius:24px;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

gap:12px;

font-size:38px;

box-shadow:

0 8px 24px
rgba(
0,
0,
0,
0.05
);

}

.cat span{

font-size:15px;

}

.section{

padding:30px 24px;

}

.section h2{

font-size:38px;

}

.cta{

margin:24px;

background:

linear-gradient(
135deg,
#F4E7E3,
#FFF
);

padding:44px;

border-radius:32px;

font-size:36px;

font-weight:800;

color:#B63A3A;

}

.bottom{

position:fixed;

bottom:0;

left:50%;

transform:

translateX(-50%);

width:min(
540px,
100%
);

background:white;

display:flex;

justify-content:space-around;

padding:20px;

border-top-left-radius:32px;

border-top-right-radius:32px;

box-shadow:

0 -10px 40px
rgba(
0,
0,
0,
0.08
);

font-size:28px;

}

</style>

</head>
<body>

<div class="app">

<header class="topbar">

<div class="menu">

☰

</div>

<div class="center">

<img
src="assets/logo icon.png"
class="logo">

<div class="title">

Hamara Bazaar

</div>

<div class="pin">

📍 Pincode: 185121

</div>

</div>

<div class="notify">

🛒

</div>

</header>

<section class="search">

<div class="searchBox">

🔍

<input
placeholder=

"Search products, shops or services">

⚙️

</div>

</section>

<section class="categories">

<div class="cat">🛒<span>Grocery</span></div>

<div class="cat">🍎<span>Fruits</span></div>

<div class="cat">🥛<span>Dairy</span></div>

<div class="cat">💄<span>Beauty</span></div>

<div class="cat">👕<span>Clothing</span></div>

<div class="cat">⋯<span>More</span></div>

</section>

<section class="section">

<h2>

Products For You

</h2>

</section>

<section class="section">

<h2>

Shops Near You

</h2>

</section>

<section class="section">

<h2>

Services For You

</h2>

</section>

<section class="cta">

Open Your Shop

</section>

<nav class="bottom">

🏠

🔍

🧰

📦

👤

</nav>

</div>

</body>



</html>
