<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Hamara Bazaar</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/index.css">

</head>

<body>
<div id="headerContainer"></div>
<main>

<section class="hero">

    <div class="location">

        📍 <span id="marketName">Your Market</span>

    </div>

    <h1>

        Everything Around You,
        <br>
        In One Place.

    </h1>

    <p>

        Discover trusted local shops,
        fresh products, useful services,
        and transport around your area.

    </p>

</section>
<section class="searchSection">

    <div class="searchBox">

        <span class="searchIcon">

            🔍

        </span>

        <input
            id="searchInput"
            type="text"
            placeholder="Search products, shops or services">

        <button
            class="filterBtn">

            ⚙

        </button>

    </div>

</section>
<section class="categories">

    <div class="sectionHeader">

        <h2>Categories</h2>

        <a href="categories.html">

            All →

        </a>

    </div>

    <div
        class="categoryScroll"
        id="categoryScroll">

    </div>

</section>
<section class="section">

    <div class="sectionHeader">

        <h2>⭐ Featured Products</h2>

        <a href="#">View All</a>

    </div>

    <div
        class="productScroll"
        id="featuredProducts">

    </div>

</section>
<section class="section">

    <div class="sectionHeader">

        <h2>🏪 Popular Shops</h2>

        <a href="shops.html">

            View All

        </a>

    </div>

    <div
        id="shopScroll"
        class="productScroll">

    </div>
</main>
<div id="bottomNavContainer"></div>
</section>
<script src="js/database.js"></script>
<script src="js/auth.js"></script>
<script src="js/shop.js"></script>
<script src="js/product.js"></script>
<script src="js/service.js"></script>
<script src="js/categories.js"></script>
<script src="js/ui.js"></script>
<script src="js/cart.js"></script>
<script src="js/components.js"></script>
<script src="js/index.js"></script>
<script>

renderLayout("home");
</script>

</body>

</html>
