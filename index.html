<!DOCTYPE html>

<html>

<head>

<title>Hmara Bazaar</title>

<style>
*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:Arial;

}

body{

background:#FAF6EE;

padding-bottom:110px;

}

.app{

max-width:540px;

margin:auto;

}

.topbar{

display:grid;

grid-template-columns:

60px

1fr

60px;

align-items:center;

padding:18px 24px;

}


.menu{

width:50px;

font-size:24px;

}
.notify{

width:50px;

font-size:24px;

text-align:right;

}


.center{

display:flex;

justify-content:center;

align-items:center;

gap:12px;

}

.logo{

width:42px;

height:42px;

object-fit:contain;

margin:0;

flex-shrink:0;

}



.title{

font-size:18px;

font-weight:800;

color:#B63A3A;

line-height:1.1;

}


.pin{

font-size:12px;

color:#888;

margin-top:4px;

}



.search{

padding:10px 24px;

}

.searchBox{

background:white;

padding:18px 22px;

border-radius:22px;

display:flex;

align-items:center;

gap:14px;

box-shadow:

0 10px 28px
rgba(
0,
0,
0,
0.04
);

}


.searchBox input{

flex:1;

border:none;

outline:none;

font-size:18px;

}

.categories{

display:flex;

gap:14px;

overflow:auto;

padding:22px;

}

.categories::-webkit-scrollbar{

display:none;

}

.cat{

min-width:96px;

height:96px;

background:white;

border-radius:22px;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

gap:8px;

font-size:30px;

box-shadow:

0 6px 20px
rgba(
0,
0,
0,
0.04
);

}


.cat span{

font-size:13px;

font-weight:600;

}

.cta{

margin:24px;

background:

linear-gradient(
135deg,
#F7ECE8,
#FFF
);

padding:36px;

border-radius:28px;

font-size:28px;

font-weight:800;

color:#B63A3A;

}

.section h2{

font-size:24px;

color:#222;

}

.bottom{

position:fixed;

bottom:0;

left:50%;

transform:

translateX(-50%);

width:min(
540px,
100%
);

background:white;

display:flex;

justify-content:space-around;

padding:20px;

border-top-left-radius:32px;

border-top-right-radius:32px;

box-shadow:

0 -10px 40px
rgba(
0,
0,
0,
0.08
);

font-size:28px;

}
.brandBlock{

display:flex;

flex-direction:column;

align-items:flex-start;

}
.shops{

display:flex;

gap:18px;

overflow:auto;

}

.shops::-webkit-scrollbar{

display:none;

}

.shop{

min-width:280px;

background:white;

border-radius:24px;

overflow:hidden;

box-shadow:

0 10px 24px
rgba(
0,
0,
0,
0.04
);

}

.board{

background:#667744;

padding:26px;

color:white;

font-size:24px;

font-weight:800;

text-align:center;

}

.shopBody{

padding:22px;

}

.status{

font-size:18px;

font-weight:700;

}

.type{

margin-top:10px;

color:#777;

}

.shop button{

margin-top:18px;

width:100%;

padding:14px;

border:none;

border-radius:16px;

background:#B63A3A;

color:white;

}
.services{

display:grid;

grid-template-columns:

1fr 1fr;

gap:16px;

}

.service{

background:white;

padding:26px;

border-radius:22px;

text-align:center;

box-shadow:

0 10px 24px
rgba(
0,
0,
0,
0.04
);

}

.serviceIcon{

font-size:48px;

margin-bottom:16px;

}
.product,
.shop,
.service,
.cat{

cursor:pointer;

transition:

.18s;

}

.product:hover,
.shop:hover,
.service:hover,
.cat:hover{

transform:

translateY(
-4px
);

}

.product:active,
.shop:active,
.service:active,
.cat:active{

transform:

scale(
0.98
);

}

button{

cursor:pointer;

}

</style>

</head>
<body>

<div class="app">

<header class="topbar">

<div class="menu">

☰

</div>

<div class="center">

<img
src="assets/logo icon.png"
class="logo">

<div class="brandBlock">

<div class="title">

Hamara Bazaar

</div>

<div class="pin">

📍 Pincode: 185121

</div>

</div>

</div>

<div class="notify">

🛒

</div>

</header>

<section class="search">

<div class="searchBox">

🔍

<input
placeholder=

"Search products, shops or services">

⚙️

</div>

</section>

<section class="categories">

<div class="cat">🛒<span>Grocery</span></div>

<div class="cat">🍎<span>Fruits</span></div>

<div class="cat">🥛<span>Dairy</span></div>

<div class="cat">💄<span>Beauty</span></div>

<div class="cat">👕<span>Clothing</span></div>

<div class="cat">⋯<span>More</span></div>

</section>

<section class="section">

<div class="sectionHead">

<h2>

Products

</h2>

<a>

View All

</a>

</div>

<div
class="products"
id="products">

</div>

</section>

<section class="section">

<div class="sectionHead">

<h2>

Shops Near You

</h2>

<a>

View All

</a>

</div>

<div
class="shops"
id="shops">

</div>

</section>


<section class="section">

<div class="sectionHead">

<h2>

Services

</h2>

<a>

View All

</a>

</div>

<div
class="services"
id="services">

</div>

</section>

<section class="cta">

Open Your Shop

</section>

<nav class="bottom">

🏠

🔍

🧰

📦

👤

</nav>
<script>
</div>
let demoProducts=[

{

name:"Product",

shop:"Shop Name",

price:"₹---",

emoji:"🛍"

},

{

name:"Product",

shop:"Shop Name",

price:"₹---",

emoji:"🛍"

}

];

let wrap=

document.getElementById(
"products"
);

demoProducts.forEach(

p=>{

wrap.innerHTML+=`

<div class="product">

<div class="pImg">

${p.emoji}

</div>

<div class="pName">

${p.name}

</div>

<div class="pShop">

${p.shop}

</div>

<div class="pPrice">

${p.price}

</div>

</div>

`;

}

);
let demoShops=[

{

name:"Shop Name",

status:"Open",

type:"General"

},

{

name:"Shop Name",

status:"Closed",

type:"Cosmetics"

}

];

let shopWrap=

document.getElementById(
"shops"
);

demoShops.forEach(

s=>{

shopWrap.innerHTML+=`

<div class="shop">

<div class="board">

${s.name}

</div>

<div class="shopBody">

<div class="status">

${s.status}

</div>

<div class="type">

${s.type}

</div>

<button>

Visit

</button>

</div>

</div>

`;

}

);
let demoServices=[

{

icon:"🚚",

name:"Transport"

},

{

icon:"🏨",

name:"Hotels"

},

{

icon:"🛠",

name:"Repair"

},

{

icon:"👨‍⚕️",

name:"Health"

}

];

let serviceWrap=

document.getElementById(
"services");

demoServices.forEach(

s=>{

serviceWrap.innerHTML+=`

<div class="service">

<div class="serviceIcon">

${s.icon}

</div>

<div>

${s.name}

</div>

</div>

`;

}

);
document
.querySelectorAll(

".product"

)

.forEach(

e=>{

e.onclick=

()=>{

window.location.href=

"./product.html";

};

}

);

document
.querySelectorAll(

".shop"

)

.forEach(

e=>{

e.onclick=

()=>{

window.location.href=

"./shop.html";

};

}

);

document
.querySelectorAll(
".product"
)

.forEach(

e=>{

e.onclick=

()=>{

window.location.href=

"./product.html";

};

}

);

document
.querySelectorAll(
".shop"
)

.forEach(

e=>{

e.onclick=

()=>{

window.location.href=

"./shop.html";

};

}

);

document
.querySelectorAll(
".service"
)

.forEach(

e=>{

e.onclick=

()=>{

window.location.href=

"./services.html";

};

}

);


</script>
</body>



</html>
