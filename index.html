<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Hamara Bazaar</title>

    <link rel="stylesheet" href="css/index.css">

</head>

<body>

<header class="topbar">

    <button
        id="menuBtn"
        class="iconBtn">

        ☰

    </button>

    <div class="brand">

        <img
            src="assets/logo icon.png"
            class="brandLogo"
            alt="Hamara Bazaar Logo">

        <div>

            <div class="brandName">

                Hamara Bazaar

            </div>

            <div class="brandTag">

                Delivering Happiness

            </div>

        </div>

    </div>

    <button class="iconBtn">

        🛒

    </button>

</header>
<section class="hero">

    <div class="location">

        📍 <span id="marketName">Your Market</span>

    </div>

    <h1>

        Everything Around You,
        <br>
        In One Place.

    </h1>

    <p>

        Discover trusted local shops,
        fresh products, useful services,
        and transport around your area.

    </p>

</section>
<section class="searchSection">

    <div class="searchBox">

        <span class="searchIcon">

            🔍

        </span>

        <input
            id="searchInput"
            type="text"
            placeholder="Search products, shops or services">

        <button
            class="filterBtn">

            ⚙

        </button>

    </div>

</section>
<section class="categories">

    <div class="sectionHeader">

        <h2>Categories</h2>

        <a href="categories.html">

            All →

        </a>

    </div>

    <div
        class="categoryScroll"
        id="categoryScroll">

    </div>

</section>
<script src="js/database.js"></script>
<script src="js/auth.js"></script>
<script src="js/shop.js"></script>
<script src="js/product.js"></script>
<script src="js/service.js"></script>
<script src="js/ui.js"></script>
<script src="js/index.js"></script>
<script src="js/categories.js"></script>
</body>

</html>
