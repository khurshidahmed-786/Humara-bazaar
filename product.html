<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Product</title>
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/product.css">

</head>

<body>
<div id="headerContainer"></div>
<main class="page">
<header class="topBar">

<button
class="backBtn">

←

</button>

<h1>

Product

</h1>

<button
class="shareBtn">

⤴

</button>

</header>


<section
class="productHero">

<div
id="productImage"
class="productImage">

📦

</div>

</section>


<section
class="productInfo">

<h2
id="productName">

Loading...

</h2>

<div
id="productRating"
class="rating">

⭐ New Product

</div>

<div
id="productPrice"
class="price">

₹0

</div>

<div
id="productStock"
class="stock">

In Stock

</div>

<div
id="productDelivery"
class="delivery">

Delivery Time

</div>

</section>


<section
class="shopCard"
id="shopCard">

<div
class="shopLeft">

<div
class="shopLogo">

🏪

</div>

<div>

<div
id="shopName">

Shop Name

</div>

<div
id="shopStatus">

Open Now

</div>

</div>

</div>

<button
id="visitShopBtn">

Visit →

</button>

</section>


<section
class="descriptionCard">

<h3>

About Product

</h3>

<p
id="productDescription">

Loading description...

</p>

</section>


<section
class="quantityCard">

<h3>

Quantity

</h3>

<div
class="quantityBox">

<button
id="minusBtn">

−

</button>

<span
id="quantity">

1

</span>

<button
id="plusBtn">

+

</button>

</div>

</section>


<section
class="relatedProducts">

<h3>

Related Products

</h3>

<div
id="relatedProducts">

</div>

</section>


<div
class="bottomBar">

<div>

<div
class="totalText">

Total

</div>

<div
id="totalPrice">

₹0

</div>

</div>

<button
id="addCartBtn">

Add To Cart

</button>

</div>
</main>
<div id="bottomNavContainer"></div>

<script src="js/database.js"></script>
<script src="js/shop.js"></script>
<script src="js/product.js"></script>
<script src="js/cart.js"></script>
<script src="js/components.js"></script>
<script src="js/productpage.js"></script>
<script> renderLayout("product"); </script>
</body>

</html>
