<!DOCTYPE html>

<html>

<head>

<title>Hmara Bazaar Dashboard</title>

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#FAF6EE;
padding-bottom:120px;
color:#222;
}

.top{

padding:22px;

display:flex;

justify-content:space-between;

align-items:center;

position:sticky;

top:0;

background:#FAF6EE;

z-index:999;

}

.menu{

font-size:34px;

cursor:pointer;

}

.panel{

display:none;

position:absolute;

left:18px;

top:80px;

width:270px;

background:white;

border-radius:26px;

overflow:hidden;

box-shadow:

0 20px 50px
rgba(0,0,0,.12);

}

.panel a{

display:block;

padding:18px;

text-decoration:none;

color:#222;

}

.panel a:hover{

background:#F6F2EA;

}

.shopHeader{

text-align:center;

}

.shopName{

font-size:34px;

font-weight:800;

color:#B63A3A;

}

.shopTime{

color:#666;

margin-top:8px;

}

.open{

display:inline-block;

margin-top:10px;

padding:10px 18px;

border-radius:16px;

background:#DFF6E5;

color:#1E8D42;

}

.cover{

height:240px;

margin:0 18px;

border-radius:34px;

overflow:hidden;

position:relative;

background:

linear-gradient(
135deg,
#B63A3A,
#D85D5D
);

}

.cover img{

width:100%;

height:100%;

object-fit:cover;

}

.logo{

width:140px;

height:140px;

border-radius:50%;

background:white;

position:relative;

margin-top:-70px;

margin-left:28px;

display:flex;

align-items:center;

justify-content:center;

overflow:hidden;

border:8px solid #FAF6EE;

box-shadow:

0 15px 40px
rgba(0,0,0,.15);

}

.logo img{

width:100%;

height:100%;

object-fit:cover;

}

.content{

padding:20px;

}

.description{

margin-top:18px;

color:#666;

line-height:1.7;

}

.section{

margin-top:40px;

}

.titleRow{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:20px;

}

.three{

font-size:28px;

cursor:pointer;

}

.products{

display:flex;

gap:18px;

overflow:auto;

padding-bottom:10px;

}

.products::-webkit-scrollbar{

display:none;

}

.card{

min-width:200px;

background:white;

border-radius:24px;

overflow:hidden;

box-shadow:

0 10px 30px
rgba(0,0,0,.05);

}

.image{

height:180px;

background:#EEE;

display:flex;

align-items:center;

justify-content:center;

font-size:60px;

}

.info{

padding:18px;

}

.add{

border:

2px dashed #B63A3A;

background:#FFF;

display:flex;

align-items:center;

justify-content:center;

font-size:26px;

color:#B63A3A;

}

.stats{

display:grid;

grid-template-columns:

repeat(4,1fr);

gap:14px;

margin-top:40px;

}

.stat{

background:white;

padding:20px;

border-radius:20px;

text-align:center;

}

.save{

margin-top:30px;

background:

linear-gradient(
90deg,
#4F8A44,
#6FA964
);

color:white;

padding:20px;

border-radius:20px;

text-align:center;

}

</style>

</head>

<body>

<div class="top">

<div
class="menu"
onclick="toggleMenu()">

☰

</div>

<div></div>

</div>

<div
class="panel"
id="panel">

<a href="/createshop.html">

✏ Edit Shop

</a>

<a href="/sellerorders.html">

📦 Orders

</a>

<a href="#">

🚚 Delivery Setup

</a>

<a href="#">

📊 Analytics

</a>

<a href="#">

⭐ Subscription

</a>

</div>

<div class="shopHeader">

<div
class="shopName"
id="shopName">

My Shop

</div>

<div
class="shopTime"
id="shopTime">

8AM — 8PM

</div>

<div class="open">

🟢 OPEN

</div>

</div>

<div class="cover">

<img
id="banner">

</div>

<div class="logo">

<img
id="logo">

</div>

<div class="content">

<div
class="description"
id="description">

Shop Description

</div>

<div class="section">

<div class="titleRow">

<h2>

Pinned Products

</h2>

<div class="three">

⋮

</div>

</div>

<div class="products">

<a
href="/addproduct.html"
class="card add">

*

</a>

<div class="card">

<div class="image">

🍚

</div>

<div class="info">

Rice

</div>

</div>

<div class="card">

<div class="image">

🥛

</div>

<div class="info">

Milk

</div>

</div>

</div>

</div>

<div class="section">

<div class="titleRow">

<h2>

New Arrivals

</h2>

<div class="three">

⋮

</div>

</div>

</div>

<div class="section">

<div class="titleRow">

<h2>

Discount Sale

</h2>

<div class="three">

⋮

</div>

</div>

</div>

<div class="stats">

<div class="stat">

104

<br>

Products

</div>

<div class="stat">

23

<br>

Orders

</div>

<div class="stat">

1248

<br>

Views

</div>

<div class="stat">

4.8

<br>

Rating

</div>

</div>

<div class="save">

✓ All changes saved

</div>

</div>

<script>

function toggleMenu(){

let p=

document
.getElementById(
"panel"
);

p.style.display=

p.style.display==="block"

?

"none"

:

"block";

}


document
.getElementById(
"shopName"
)
.innerText=

localStorage
.getItem(
"shopName"
)

||

"My Shop";


document
.getElementById(
"description"
)
.innerText=

localStorage
.getItem(
"shopDescription"
)

||

"Description";


document
.getElementById(
"shopTime"
)
.innerText=

(

localStorage
.getItem(
"shopOpen"
)

||

"8AM"

)

+

" — "

+

(

localStorage
.getItem(
"shopClose"
)

||

"8PM"

);


let logo=

localStorage
.getItem(
"shopLogo"
);

if(logo){

document
.getElementById(
"logo"
).src=

logo;

}


let banner=

localStorage
.getItem(
"shopBanner"
);

if(banner){

document
.getElementById(
"banner"
).src=

banner;

}

</script>

</body>

</html>
