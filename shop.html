<script>

function togglePanel(){

    let p = document.getElementById("shopPanel");

    p.style.display =
        p.style.display === "block"
        ? "none"
        : "block";

}

/* ---------- Load Selected Shop ---------- */

const selectedId = Number(localStorage.getItem("selectedShop"));

const shops = getShops();

const shop = shops.find(s => s.id === selectedId);

if(shop){

    document.getElementById("displayName").innerText =
        shop.name || "Unnamed Shop";

    document.getElementById("displayDescription").innerText =
        shop.description || "No description added.";

    document.getElementById("displayTime").innerText =
        `Open: ${shop.open || "8:00 AM"} — ${shop.close || "8:00 PM"}`;

    if(shop.logo){

        document.getElementById("displayLogo").src =
            shop.logo;

    }else{

        document.getElementById("displayLogo").style.display = "none";

    }

    document.getElementById("shopStatus").innerHTML =
        "🟢 Open Now";

}else{

    document.getElementById("displayName").innerText =
        "Shop Not Found";

    document.getElementById("displayDescription").innerText =
        "This shop does not exist.";

    document.getElementById("displayTime").innerText = "";

    document.getElementById("shopStatus").innerHTML =
        "⚫ Unavailable";

}

</script>
