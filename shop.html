<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Shop — Hamara Bazaar</title>

    <link
        rel="stylesheet"
        href="css/theme.css">

    <link
        rel="stylesheet"
        href="css/components.css">

    <link
        rel="stylesheet"
        href="css/shop.css">

</head>


<body>


<!-- ==========================================
     GLOBAL HAMARA BAZAAR NAVIGATION
========================================== -->

<div id="headerContainer"></div>


<!-- ==========================================
     SHOP PAGE
========================================== -->

<main class="shopPage">


    <!-- ======================================
         SHOP BILLBOARD
    ======================================= -->

    <section
        class="shopBillboard"
        id="shopBillboard">


        <div class="billboardContent">


            <div class="billboardText">


                <h1 id="displayName">

                    Shop Name

                </h1>


                <p
                    id="displayDescription">

                    Shop Description

                </p>


                <div
                    class="billboardLocation"
                    id="displayLocation">

                    📍 Local Market

                </div>


            </div>


        </div>


        <!-- CIRCULAR SHOP LOGO -->

        <div class="shopLogo">

            <img
                id="displayLogo"
                alt="Shop Logo">

            <span
                id="logoPlaceholder">

                🏪

            </span>

        </div>


    </section>



    <!-- ======================================
         SHOP INFORMATION
    ======================================= -->

    <section class="shopInfo">


        <div class="shopInfoMain">


            <div
                class="status"
                id="shopStatus">

                🟢 Open Now

            </div>


            <div
                class="time"
                id="displayTime">

                Open Time

            </div>


        </div>


        <div
            class="shopLocation"
            id="shopLocation">

            📍 Local Market

        </div>


    </section>



    <!-- ======================================
         PRODUCT CONTENT
    ======================================= -->


    <div class="shopProducts">


        <!-- FEATURED -->

        <section
            class="productSection"
            id="featuredSection">

            <div class="sectionHeader">

                <h2>

                    ⭐ Featured

                </h2>

            </div>


            <div
                class="products"
                id="featuredProducts">

            </div>

        </section>



        <!-- NEW ARRIVAL -->

        <section
            class="productSection"
            id="newSection">

            <div class="sectionHeader">

                <h2>

                    🆕 New Arrival

                </h2>

            </div>


            <div
                class="products"
                id="newProducts">

            </div>

        </section>



        <!-- DISCOUNT SALE -->

        <section
            class="productSection"
            id="saleSection">

            <div class="sectionHeader">

                <h2>

                    🔥 Discount Sale

                </h2>

            </div>


            <div
                class="products"
                id="saleProducts">

            </div>

        </section>


    </div>


</main>



<!-- ==========================================
     FIXED SHOP ACTION BAR
========================================== -->

<div class="shopActionBar">


    <button
        class="shopAction secondary"
        id="contactShopBtn">

        Contact Shop

    </button>


    <button
        class="shopAction primary"
        id="browseProductsBtn">

        Browse Products

    </button>


</div>



<!-- ==========================================
     BOTTOM NAVIGATION
========================================== -->

<div id="bottomNavContainer"></div>



<!-- ==========================================
     JAVASCRIPT
========================================== -->

<script src="js/database.js"></script>

<script src="js/auth.js"></script>

<script src="js/shop.js"></script>

<script src="js/product.js"></script>

<script src="js/cart.js"></script>

<script src="js/components.js"></script>


<script>

    renderLayout("shop");

</script>


</body>

</html>
