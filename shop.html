<!DOCTYPE html>

<html>

<head>

<title>Shop</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:#FAF6EE;

padding-bottom:120px;

}

.cover{

height:260px;

background:

linear-gradient(
135deg,
#B63A3A,
#D85D5D
);

border-radius:

0
0
40px
40px;

position:relative;

}

.shopLogo{

width:120px;

height:120px;

background:white;

border-radius:50%;

position:absolute;

bottom:-60px;

left:40px;

display:flex;

align-items:center;

justify-content:center;

font-size:48px;

box-shadow:

0 10px 30px
rgba(0,0,0,.15);

}

.content{

padding:

90px
24px
24px;

}

.name{

font-size:42px;

font-weight:800;

}

.status{

margin-top:14px;

display:inline-block;

padding:

10px
16px;

border-radius:16px;

background:

#E7F8EA;

color:

#1D8A3C;

}

.time{

margin-top:18px;

color:#777;

}

.description{

margin-top:20px;

line-height:1.7;

color:#555;

}

.section{

margin-top:50px;

}

.products{

display:grid;

grid-template-columns:

repeat(
auto-fill,
minmax(
180px,
1fr
));

gap:20px;

}

.product{

background:white;

border-radius:22px;

overflow:hidden;

}

.image{

height:170px;

background:#EEE;

display:flex;

align-items:center;

justify-content:center;

font-size:60px;

}

.info{

padding:18px;

}

.price{

color:#B63A3A;

font-size:22px;

margin-top:10px;

}

.orderBar{

position:fixed;

bottom:0;

left:0;

width:100%;

background:white;

padding:18px;

display:flex;

gap:14px;

box-shadow:

0 -10px 30px
rgba(0,0,0,.08);

}

.btn{

flex:1;

padding:18px;

border-radius:16px;

border:none;

font-size:18px;

}

.primary{

background:#B63A3A;

color:white;

}

.secondary{

background:#F2EEE6;

}

.closed{

background:#555;

color:white;

}

</style>

</head>

<body>

<div class="cover">

<div class="shopLogo">

🏪

</div>

</div>

<div class="content">

<div class="name">

Ahmad Grocery

</div>

<div
class="status"
id="shopStatus">

🟢 Open Now

</div>

<div class="time">

Open:
8:00 AM — 8:00 PM

</div>

<div class="description">

Fresh products from your local market.
Order online and receive delivery from nearby sellers.

</div>

<div class="section">

<h2>

Products

</h2>

<br>

<div class="products">

<div class="product">

<div class="image">

🍚

</div>

<div class="info">

Premium Rice

<div class="price">

₹70

</div>

</div>

</div>

<div class="product">

<div class="image">

🥛

</div>

<div class="info">

Fresh Milk

<div class="price">

₹35

</div>

</div>

</div>

<div class="product">

<div class="image">

💄

</div>

<div class="info">

Lipstick

<div class="price">

₹199

</div>

</div>

</div>

</div>

</div>

</div>

<div class="orderBar">

<button
class="btn secondary">

Chat

</button>

<button
class="btn primary"
id="orderBtn">

Order Today

</button>

</div>

<script>

let open=true;

if(!open){

document
.getElementById(
"shopStatus"
)
.classList
.add(
"closed"
);

document
.getElementById(
"shopStatus"
)
.innerHTML=

"⚫ Closed • Opens Tomorrow";

document
.getElementById(
"orderBtn"
)
.innerHTML=

"Order For Tomorrow";

}

</script>

</body>

</html>
