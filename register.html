<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Create Account | Hamara Bazaar</title>

<style>

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

    font-family:Arial;

}

body{

    background:#FAF6EE;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;

}

.box{

    background:white;

    padding:40px;

    border-radius:20px;

    width:100%;

    max-width:500px;

}

h1{

    margin-bottom:10px;

}

p{

    color:#666;

    margin-bottom:25px;

}

input{

    width:100%;

    padding:14px;

    margin:10px 0;

    border:1px solid #ddd;

    border-radius:10px;

}

button{

    padding:16px;

    margin-top:15px;

    background:#667744;

    color:white;

    border:none;

    border-radius:12px;

    width:100%;

    cursor:pointer;

    font-size:16px;

}

.error{

    color:#B63A3A;

    margin-top:15px;

    display:none;

}

</style>

</head>


<body>


<div class="box">

<h1>

Create Account

</h1>

<p>

Join Hamara Bazaar and connect with
your local community.

</p>


<input

id="name"

placeholder="Full Name *">


<input

id="phone"

placeholder="Mobile Number *"


type="tel">


<input

id="area"

placeholder="Area / Locality *">


<button

id="registerBtn">

Create Account

</button>


<div

id="error"

class="error">

</div>


</div>


<script src="js/database.js"></script>

<script src="js/auth.js"></script>


<script>

document

.getElementById("registerBtn")

.onclick=function(){


const name =

document

.getElementById("name")

.value

.trim();


const phone =

document

.getElementById("phone")

.value

.trim();


const area =

document

.getElementById("area")

.value

.trim();


const error =

document

.getElementById("error");


if(!name){

error.innerText =

"Please enter your name.";

error.style.display =

"block";

return;

}


if(!phone){

error.innerText =

"Please enter your mobile number.";

error.style.display =

"block";

return;

}


if(!area){

error.innerText =

"Please enter your area.";

error.style.display =

"block";

return;

}


const user =

registerUser(

name,

phone

);


/*

SAVE AREA

*/

user.area = area;


/*

UPDATE USER RECORD

*/

let users = getUsers();


users = users.map(

u =>

u.id === user.id

? user

: u

);


saveData(

DB.USERS,

users

);


/*

REDIRECT

*/

window.location.href =

"index.html";


};

</script>


</body>

</html>
