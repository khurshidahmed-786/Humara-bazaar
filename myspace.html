<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>My Space</title>

<script src="js/database.js"></script>

<script src="js/auth.js"></script>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:Arial,sans-serif;

}

body{

background:#FAF6EE;

padding:24px;

}

.header{

display:flex;

align-items:center;

gap:15px;

margin-bottom:35px;

}

.logo{

width:60px;

}

.title{

font-size:28px;

font-weight:bold;

color:#B63A3A;

}

.tag{

color:#667744;

font-size:15px;

}

.card{

background:white;

border-radius:22px;

padding:24px;

box-shadow:0 10px 30px rgba(0,0,0,.08);

margin-bottom:22px;

}

.name{

font-size:28px;

font-weight:bold;

margin-bottom:10px;

color:#333;

}

.role{

display:inline-block;

background:#667744;

color:white;

padding:8px 18px;

border-radius:50px;

margin-top:10px;

}

button{

width:100%;

padding:16px;

border:none;

border-radius:16px;

margin-top:15px;

font-size:17px;

cursor:pointer;

}

.primary{

background:#B63A3A;

color:white;

}

.secondary{

background:white;

border:2px solid #B63A3A;

color:#B63A3A;

}

</style>

</head>

<body>

<div class="header">

<img
src="assets/logo icon.png"
class="logo">

<div>

<div class="title">

My Space

</div>

<div class="tag">

Delivering Happiness

</div>

</div>

</div>

<div class="card">

<div
class="name"
id="userName">

Loading...

</div>

<div
id="market">

</div>

<div
class="role"
id="role">

</div>

</div>

<button

class="primary"

onclick="becomeSeller()">

Become a Seller

</button>

<button

class="secondary"

onclick="logoutUser()">

Logout

</button>

<script>

let user=currentUser();

if(!user){

window.location.href="account.html";

}

document.getElementById(

"userName"

).innerText=

user.name;

document.getElementById(

"market"

).innerHTML=

"📍 Market : "

+

(user.market||"Unknown");

document.getElementById(

"role"

).innerText=

user.activeRole;

function logoutUser(){

logout();

window.location.href="account.html";

}

function becomeSeller(){

becomeSeller();

location.reload();

}

</script>

</body>

</html>
