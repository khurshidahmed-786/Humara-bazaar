<!DOCTYPE html>

<html>

<head>

<title>Add Product</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#FAF6EE;
}

.wrap{
max-width:900px;
margin:auto;
padding:40px;
}

.card{
background:white;
padding:30px;
border-radius:20px;
}

input,
select{

width:100%;

padding:14px;

margin:10px 0;

border-radius:10px;

border:1px solid #ddd;

}

.button{

display:inline-block;

padding:14px 20px;

background:#B63A3A;

color:white;

text-decoration:none;

border-radius:10px;

}
textarea{

width:100%;

min-height:120px;

padding:14px;

margin:10px 0;

border-radius:10px;

border:1px solid #ddd;

resize:vertical;

font-family:Arial;

}
</style>

</head>

<body>

<div class="wrap">

<h2>Add Product</h2>

<input id="productName" placeholder="Product Name">

<textarea id="productDescription" placeholder="Describe your product"></textarea>

<select id="productCategory">
    <option>Grocery</option>
    <option>Restaurant</option>
    <option>Fashion</option>
    <option>Beauty</option>
    <option>Electronics</option>
</select>

<input id="productPrice" placeholder="Price">

<input id="productStock" placeholder="Available Stock">

<select id="productUnit">
    <option>Piece</option>
    <option>Kg</option>
    <option>Gram</option>
    <option>Litre</option>
    <option>Pack</option>
</select>

<input id="productDelivery" placeholder="Delivery Time">

<select id="productSection">
    <option value="featured">⭐ Featured</option>
    <option value="new">🆕 New Arrival</option>
    <option value="sale">🔥 On Sale</option>
</select>

<input id="productEmoji" placeholder="Emoji (🍎 🥛 🍔)">
<script src="js/database.js"></script>

<script src="js/product.js"></script>
<script>
<script>

function publishProduct(){

let product={

id:Date.now(),

shopId:localStorage.getItem("hb_selectedShop"),

name:document.getElementById("productName").value,

description:document.getElementById("productDescription").value,

category:document.getElementById("productCategory").value,

price:Number(document.getElementById("productPrice").value),

stock:Number(document.getElementById("productStock").value),

unit:document.getElementById("productUnit").value,

deliveryTime:document.getElementById("productDelivery").value,

section:document.getElementById("productSection").value,

emoji:document.getElementById("productEmoji").value,

featured:

document.getElementById("productSection").value==="featured",

active:true,

createdAt:Date.now()

};

if(product.name===""){

alert("Enter product name");

return;

}

if(product.price<=0){

alert("Enter valid price");

return;

}

saveProduct(product);

document.getElementById("publishBtn").innerText=

"✅ Product Published";

setTimeout(function(){

window.location.href="dashboard.html";

},1000);

}

</script>


</script>

</body>

</html>
