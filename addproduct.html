<!DOCTYPE html>

<html>

<head>

<title>Add Product</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#FAF6EE;
}

.wrap{
max-width:900px;
margin:auto;
padding:40px;
}

.card{
background:white;
padding:30px;
border-radius:20px;
}

input,
select{

width:100%;

padding:14px;

margin:10px 0;

border-radius:10px;

border:1px solid #ddd;

}

.button{

display:inline-block;

padding:14px 20px;

background:#B63A3A;

color:white;

text-decoration:none;

border-radius:10px;

}

</style>

</head>

<body>

<div class="wrap">

<h1>

Add Product

</h1>

<br>

<div class="card">

<input
id="productName"
placeholder="Product Name">

<input
id="productPrice"
placeholder="Price">

<select
id="productSection">

<option>

Pinned Products

</option>

<option>

New Arrivals

</option>

<option>

Discount Sale

</option>

</select>

<input
id="productDelivery"
placeholder="Delivery Time">

<div

id="publishBtn"

onclick="saveProduct()"

style="

margin-top:24px;

background:

linear-gradient(
135deg,
#B63A3A,
#D85D5D
);

color:white;

padding:18px;

border-radius:18px;

text-align:center;

font-size:20px;

font-weight:700;

cursor:pointer;

">

＋ Publish Product

</div>

</div>

</div>

<script>

function saveProduct(){

let products=

JSON.parse(

localStorage.getItem(
"products"
)

)

||

[];



let product={

name:

document
.getElementById(
"productName"
)
.value,

price:

document
.getElementById(
"productPrice"
)
.value,

section:

document
.getElementById(
"productSection"
)
.value,

delivery:

document
.getElementById(
"productDelivery"
)
.value

};



products.push(
product
);



localStorage.setItem(

"products",

JSON.stringify(
products
)

);



document
.getElementById(
"publishBtn"
)
.innerText=

"Publishing...";



setTimeout(

function(){

window.location.href=

"/dashboard.html";

},

800);

}

</script>

</body>

</html>
