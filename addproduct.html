<!DOCTYPE html>

<html>

<head>

<title>Add Product</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#FAF6EE;
}

.wrap{
max-width:900px;
margin:auto;
padding:40px;
}

.card{
background:white;
padding:30px;
border-radius:20px;
}

input,
select{

width:100%;

padding:14px;

margin:10px 0;

border-radius:10px;

border:1px solid #ddd;

}

.button{

display:inline-block;

padding:14px 20px;

background:#B63A3A;

color:white;

text-decoration:none;

border-radius:10px;

}
textarea{

width:100%;

min-height:120px;

padding:14px;

margin:10px 0;

border-radius:10px;

border:1px solid #ddd;

resize:vertical;

font-family:Arial;

}
</style>

</head>

<body>

<div class="wrap">

<h2>Add Product</h2>

<input id="productName" placeholder="Product Name">

<textarea id="productDescription" placeholder="Describe your product"></textarea>

<select id="productCategory">
    <option>Grocery</option>
    <option>Restaurant</option>
    <option>Fashion</option>
    <option>Beauty</option>
    <option>Electronics</option>
</select>

<input id="productPrice" placeholder="Price">

<input id="productStock" placeholder="Available Stock">

<select id="productUnit">
    <option>Piece</option>
    <option>Kg</option>
    <option>Gram</option>
    <option>Litre</option>
    <option>Pack</option>
</select>

<input id="productDelivery" placeholder="Delivery Time">

<select id="productSection">
    <option value="featured">⭐ Featured</option>
    <option value="new">🆕 New Arrival</option>
    <option value="sale">🔥 On Sale</option>
</select>

<input id="productEmoji" placeholder="Emoji (🍎 🥛 🍔)">

<script>

function saveProduct(){

let products=

JSON.parse(

localStorage.getItem(
"products"
)

)

||

[];



let product={

name:

document
.getElementById(
"productName"
)
.value,

price:

document
.getElementById(
"productPrice"
)
.value,

section:

document
.getElementById(
"productSection"
)
.value,

delivery:

document
.getElementById(
"productDelivery"
)
.value

};



products.push(
product
);



localStorage.setItem(

"products",

JSON.stringify(
products
)

);



document
.getElementById(
"publishBtn"
)
.innerText=

"Publishing...";



setTimeout(

function(){

window.location.href=

"/dashboard.html";

},

800);

}

</script>

</body>

</html>
