<!DOCTYPE html>

<html>

<head>

<title>Add Product</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#FAF6EE;
}

.wrap{
max-width:900px;
margin:auto;
padding:40px;
}

.card{
background:white;
padding:30px;
border-radius:20px;
}

input,
select{

width:100%;

padding:14px;

margin:10px 0;

border-radius:10px;

border:1px solid #ddd;

}

.button{

display:inline-block;

padding:14px 20px;

background:#B63A3A;

color:white;

text-decoration:none;

border-radius:10px;

}

</style>

</head>

<body>

<div class="wrap">

<h1>

Add Product

</h1>

<br>

<div class="card">

<input placeholder="Product Name">

<input placeholder="Price">

<select>

<option>Grocery</option>

<option>Restaurant</option>

<option>Shoes</option>

<option>Clothes</option>

<option>Cosmetics</option>

</select>

<input placeholder="Delivery Time">

<a
class="button"
href="/dashboardproducts.html">

Publish Product

</a>

</div>

</div>

</body>

</html>
